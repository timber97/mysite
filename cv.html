<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CV — Timber Stinson-Schroff</title>
<meta name="description" content="CV for Timber Stinson-Schroff. Strategy, analysis and writing across government and tech.">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%99%96</text></svg>">

<style>
  :root{
    --paper:#F5F6F4;
    --ink:#17191C;
    --muted:#6A6E73;
    --line:#DCDDD8;
    --accent:#9A2F2F;
    --measure:60ch;
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  *{ box-sizing:border-box; }

  html{ -webkit-text-size-adjust:100%; }

  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--serif);
    font-size:clamp(1.05rem, 0.95rem + 0.4vw, 1.2rem);
    line-height:1.6;
    text-rendering:optimizeLegibility;
    -webkit-font-smoothing:antialiased;
  }

  a{ color:inherit; text-decoration:none; }

  .page{
    max-width:46rem;
    margin:0 auto;
    padding:clamp(2.5rem, 6vw, 6rem) clamp(1.4rem, 5vw, 3rem) 3rem;
    border-left:1px solid var(--line);
  }

  .back{
    font-family:var(--sans);
    font-size:0.82rem;
    color:var(--muted);
    border-bottom:1px solid var(--line);
    transition:border-color .15s, color .15s;
  }
  .back:hover{ color:var(--accent); border-color:var(--accent); }

  .mark{
    font-size:clamp(2.4rem, 6vw, 3.6rem);
    line-height:1;
    margin:1.6rem 0 0.6rem -0.08em;
    color:var(--ink);
  }

  h1{
    font-size:clamp(1.4rem, 1rem + 1.8vw, 2rem);
    font-weight:600;
    letter-spacing:-0.01em;
    line-height:1.15;
    margin:0 0 0.3rem;
  }

  .locus{
    font-family:var(--sans);
    font-size:0.78rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 2rem;
  }

  .rule{
    border:0;
    border-top:1px solid var(--line);
    margin:2.2rem 0;
  }

  .eyebrow{
    font-family:var(--sans);
    font-size:0.72rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--muted);
    margin:2.2rem 0 0.8rem;
  }

  .entry{ margin:0 0 1.6rem; max-width:var(--measure); }
  .entry-title{ font-weight:600; margin:0; }
  .entry-meta{
    font-family:var(--sans);
    font-size:0.82rem;
    color:var(--muted);
    margin:0.15rem 0 0.3rem;
  }
  .entry p{ margin:0.3rem 0 0; }

  .entry a{
    border-bottom:1px solid var(--line);
    transition:border-color .15s, color .15s;
  }
  .entry a:hover{ color:var(--accent); border-color:var(--accent); }

  .foot{
    font-family:var(--sans);
    font-size:0.9rem;
    letter-spacing:0.01em;
    margin-top:2.8rem;
    padding-top:1.4rem;
    border-top:1px solid var(--line);
    display:flex;
    flex-wrap:wrap;
    gap:0.4rem 1.4rem;
  }
  .foot a{
    color:var(--muted);
    transition:color .15s;
  }
  .foot a:hover{ color:var(--accent); }

  a:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
    border-radius:1px;
  }

  @media print{
    body{ font-size:11pt; }
    .page{ border:0; padding:0; }
    .back, .foot{ display:none; }
  }
</style>
</head>
<body>
  <main class="page">
    <a class="back" href="index.html">&larr; Home</a>
    <div class="mark" aria-hidden="true">&#9814;</div>
    <h1>Timber Stinson-Schroff</h1>
    <p class="locus">Whitehorse &middot; Yukon</p>

    <hr class="rule">

    <p class="eyebrow">Experience</p>

    <div class="entry">
      <p class="entry-title">Director, <a href="https://protocol-institute.org/">Protocol Institute</a></p>
      <p class="entry-meta">2023 &ndash; Present</p>
    </div>

    <!-- Add more experience entries here -->

    <p class="eyebrow">Education</p>

    <div class="entry">
      <p class="entry-title">Degree &amp; Institution</p>
      <p class="entry-meta">Year</p>
    </div>

    <!-- Add more education entries here -->

    <nav class="foot">
      <a href="index.html">Home</a>
      <a href="https://www.linkedin.com/in/t-schroff/">LinkedIn</a>
      <a href="mailto:timbercschroff@gmail.com">Email</a>
    </nav>
  </main>
</body>
</html>
